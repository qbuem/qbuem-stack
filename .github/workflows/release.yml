name: Release

# Triggered by a version tag push: git tag v0.3.0 && git push origin v0.3.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub releases and upload assets

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64
          - os: macos-14
            platform: macos-arm64

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Linux: install liburing ─────────────────────────────────────────────
      - name: Install liburing (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y liburing-dev

      # ── Resolve beast_json tag at release time ──────────────────────────────
      # Pin to the latest tagged release of beast_json so the installed
      # draco-config.cmake always fetches a stable, reproducible version.
      - name: Resolve beast_json latest tag
        id: beast_tag
        run: |
          TAG=$(git ls-remote --tags --refs https://github.com/the-lkb/beast-json.git \
                | awk '{print $2}' \
                | sed 's|refs/tags/||' \
                | grep -E '^v?[0-9]+\.[0-9]+' \
                | sort -V \
                | tail -1)
          # Fall back to main if no semver tags found yet
          TAG=${TAG:-main}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "beast_json tag: $TAG"

      # ── Configure ───────────────────────────────────────────────────────────
      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDRACO_BUILD_TESTS=OFF \
            -DDRACO_BUILD_EXAMPLES=OFF \
            -DDRACO_BEAST_JSON_TAG=${{ steps.beast_tag.outputs.tag }}

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      # ── Install into staging dir ─────────────────────────────────────────────
      - name: Install
        run: cmake --install build --prefix dist

      # ── Show what we packaged ────────────────────────────────────────────────
      - name: List artifacts
        run: find dist -type f | sort

      # ── Create tarball ───────────────────────────────────────────────────────
      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}           # e.g. v0.2.0
          ARCHIVE="draco-${VERSION}-${{ matrix.platform }}.tar.gz"
          tar -czf "${ARCHIVE}" -C dist .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      # ── Upload to GitHub Release (creates it if it doesn't exist) ────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          body: |
            ## draco ${{ github.ref_name }}

            ### Bundled dependency versions
            | Dependency | Version |
            |------------|---------|
            | beast_json | `${{ steps.beast_tag.outputs.tag }}` |

            ### Usage
            Download the tarball for your platform, then in your `CMakeLists.txt`:

            ```cmake
            list(APPEND CMAKE_PREFIX_PATH "/path/to/draco-dist")
            find_package(draco REQUIRED)

            # Link only what you need:
            target_link_libraries(myapp PRIVATE draco::draco)  # full
            target_link_libraries(myapp PRIVATE draco::http)   # HTTP + core
            target_link_libraries(myapp PRIVATE draco::core)   # reactor only
            ```

            beast_json is fetched automatically at configure time — no manual setup needed.
          generate_release_notes: true

  # ── CI test job (runs on every tag push, not just releases) ─────────────────
  test:
    name: Test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install liburing (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y liburing-dev

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDRACO_BUILD_TESTS=ON \
            -DDRACO_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --config Release -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release
