name: Release

# Triggered by a version tag push: git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub releases and upload assets

# ============================================================================
# Job graph:
#
#   analyze ──┐
#             ├─► build/linux-x86_64   ──┐
#   test    ──┤                           ├─► publish (single release upload)
#             └─► build/linux-aarch64  ──┘
#
# Supported distribution architectures:
#   - linux-x86_64  (Ubuntu 22.04, glibc 2.35+)
#   - linux-aarch64 (Ubuntu 24.04 ARM runner, glibc 2.39+)
#
# Each build job produces a self-contained include-lib tarball:
#   include/   ← all public headers
#   lib/       ← static archives (.a)
#   lib/cmake/ ← CMake package config for find_package()
#
# The publish job downloads both tarballs and creates the GitHub Release in
# one shot to avoid race conditions on the release body.
# ============================================================================

jobs:
  # ── 1. Static analysis (clang-tidy) ─────────────────────────────────────────
  analyze:
    name: Static Analysis (clang-tidy)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang clang-tidy liburing-dev

      - name: Configure (generate compile_commands.json)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DQBUEM_BUILD_TESTS=OFF \
            -DQBUEM_BUILD_EXAMPLES=OFF

      # Build library targets so FetchContent headers are materialised and
      # clang-tidy can resolve all includes.
      - name: Materialise FetchContent headers
        run: cmake --build build --target qbuem_core --target qbuem_http --target qbuem -j$(nproc) || true

      - name: Run clang-tidy
        run: |
          run-clang-tidy \
            -p build \
            -config-file .clang-tidy \
            -j$(nproc) \
            $(find src -name '*.cpp' | sort)

  # ── 2. Test (both release architectures) ─────────────────────────────────────
  test:
    name: Test / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install liburing
        run: sudo apt-get update -q && sudo apt-get install -y liburing-dev

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DQBUEM_BUILD_TESTS=ON \
            -DQBUEM_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release

  # ── 3. Build release artifacts (include-lib distribution) ────────────────────
  build:
    name: Build / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: [analyze, test]

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install liburing
        run: sudo apt-get update -q && sudo apt-get install -y liburing-dev

      - name: Configure (library only — no tests, no examples)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DQBUEM_BUILD_TESTS=OFF \
            -DQBUEM_BUILD_EXAMPLES=OFF \
            -DQBUEM_BUILD_BENCH=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Install into dist/ (include-lib layout)
        run: cmake --install build --prefix dist

      - name: Verify include-lib layout
        run: |
          test -d dist/include/qbuem \
            || (echo "ERROR: include/qbuem directory missing" && exit 1)
          test -f dist/include/qbuem/qbuem_stack.hpp \
            || (echo "ERROR: umbrella header qbuem_stack.hpp missing" && exit 1)
          ls dist/lib/*.a > /dev/null 2>&1 \
            || (echo "ERROR: no static libraries (.a) found in dist/lib/" && exit 1)
          test -f dist/lib/cmake/qbuem-stack/qbuem-stack-config.cmake \
            || (echo "ERROR: CMake package config missing" && exit 1)
          echo "Install layout verified:"
          find dist -type f | sort

      - name: Package as tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="qbuem-stack-${VERSION}-${{ matrix.platform }}.tar.gz"
          tar -czf "${ARCHIVE}" -C dist .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "SHA256:"
          cat "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          retention-days: 1

  # ── 4. Publish GitHub Release (single job — no race condition) ───────────────
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: [build]

    steps:
      - name: Download all platform tarballs
        uses: actions/download-artifact@v4
        with:
          pattern: qbuem-stack-*
          merge-multiple: true   # flatten all artifacts into cwd

      - name: List artifacts
        run: |
          echo "=== Release artifacts ==="
          ls -lh qbuem-stack-*.tar.gz
          echo "=== Checksums ==="
          cat qbuem-stack-*.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            qbuem-stack-*.tar.gz
            qbuem-stack-*.sha256
          body: |
            ## qbuem-stack ${{ github.ref_name }}

            Zero Latency · Zero Allocation · Zero Dependency
            C++23 high-performance infrastructure library.

            ---

            ### Distribution Packages

            | Artifact | OS | Architecture |
            |----------|----|--------------|
            | `qbuem-stack-${{ github.ref_name }}-linux-x86_64.tar.gz`  | Ubuntu 22.04 (glibc 2.35+) | x86-64 |
            | `qbuem-stack-${{ github.ref_name }}-linux-aarch64.tar.gz` | Ubuntu 24.04 (glibc 2.39+) | AArch64 |

            Each tarball contains:
            ```
            include/qbuem/          ← all public headers (qbuem_stack.hpp umbrella)
            lib/                    ← static archives (.a)
            lib/cmake/qbuem-stack/  ← CMake package config for find_package()
            ```

            Verify integrity with the accompanying `.sha256` files:
            ```bash
            sha256sum -c qbuem-stack-${{ github.ref_name }}-linux-x86_64.tar.gz.sha256
            ```

            ---

            ### Integration

            Extract the tarball, then add to your CMake project:

            ```cmake
            list(APPEND CMAKE_PREFIX_PATH "/path/to/qbuem-stack-dist")
            find_package(qbuem-stack REQUIRED)

            # Full stack (pipeline + HTTP + reactor + all extensions)
            target_link_libraries(myapp PRIVATE qbuem-stack::qbuem)

            # Selective components
            target_link_libraries(myapp PRIVATE qbuem-stack::http)      # HTTP/1.1 only
            target_link_libraries(myapp PRIVATE qbuem-stack::pipeline)  # pipeline only
            target_link_libraries(myapp PRIVATE qbuem-stack::core)      # reactor only
            ```

            > **Note:** JSON parsing is not bundled. Choose your preferred library
            > (simdjson, nlohmann/json, glaze, etc.) and parse `req.body()` directly.

            > **Requirements:** C++23 compiler (GCC 13+ or Clang 17+), CMake ≥ 3.20,
            > `liburing-dev` on Linux for `io_uring` support.
          generate_release_notes: true
