name: Release

# Triggered by a version tag push: git tag v0.3.0 && git push origin v0.3.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub releases and upload assets

# ============================================================================
# Job graph:
#
#   analyze ──┐
#             ├─► build (matrix: macos-arm64, linux-x86_64, linux-aarch64)
#   test    ──┘           └─► upload artifacts to GitHub Release
#
# Release artifacts are only published when both static analysis and all
# platform tests pass.
# ============================================================================

jobs:
  # ── 1. Static analysis ───────────────────────────────────────────────────────
  analyze:
    name: Static Analysis (clang-tidy)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang clang-tidy liburing-dev

      # Build only the library sources; tests/examples would pull in gtest
      # which we do not want to analyze.
      - name: Configure (compile_commands.json)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DDRACO_BUILD_TESTS=OFF \
            -DDRACO_BUILD_EXAMPLES=OFF

      # Generate headers / dependency sources so clang-tidy can parse them.
      - name: Fetch dependencies (headers only)
        run: cmake --build build --target draco_core --target draco_http --target draco -j$(nproc) || true

      - name: Run clang-tidy
        run: |
          # run-clang-tidy analyses every TU that appears in compile_commands.json
          # and is located under src/ — vendored / fetched deps are excluded.
          run-clang-tidy \
            -p build \
            -config-file .clang-tidy \
            -j$(nproc) \
            $(find src -name '*.cpp' | sort)

  # ── 2. Test (all release platforms) ─────────────────────────────────────────
  test:
    name: Test / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-arm64
          - os: ubuntu-22.04
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install liburing (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y liburing-dev

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDRACO_BUILD_TESTS=ON \
            -DDRACO_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release

  # ── 3. Build release artifacts ───────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: [analyze, test]

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-arm64
          - os: ubuntu-22.04
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install liburing (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y liburing-dev

      # Pin beast_json to the latest semver tag that existed at release time.
      # This tag is baked into the installed draco-config.cmake so that
      # downstream find_package(draco) fetches the exact same version.
      - name: Resolve beast_json latest tag
        id: beast_tag
        run: |
          TAG=$(git ls-remote --tags --refs https://github.com/the-lkb/beast-json.git \
                | awk '{print $2}' \
                | sed 's|refs/tags/||' \
                | grep -E '^v?[0-9]+\.[0-9]+' \
                | sort -V \
                | tail -1)
          TAG=${TAG:-main}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Pinning beast_json to: $TAG"

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDRACO_BUILD_TESTS=OFF \
            -DDRACO_BUILD_EXAMPLES=OFF \
            -DDRACO_BEAST_JSON_TAG=${{ steps.beast_tag.outputs.tag }}

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Install
        run: cmake --install build --prefix dist

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARCHIVE="draco-${VERSION}-${{ matrix.platform }}.tar.gz"
          tar -czf "${ARCHIVE}" -C dist .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "BEAST_TAG=${{ steps.beast_tag.outputs.tag }}" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          body: |
            ## draco ${{ github.ref_name }}

            ### Dependency versions baked into this release
            | Library    | Version |
            |------------|---------|
            | beast_json | `${{ steps.beast_tag.outputs.tag }}` |

            ### Platforms
            | Artifact | OS | Arch |
            |----------|----|------|
            | `draco-*-macos-arm64.tar.gz`   | macOS 14 | Apple Silicon |
            | `draco-*-linux-x86_64.tar.gz`  | Ubuntu 22.04 | x86-64 |
            | `draco-*-linux-aarch64.tar.gz` | Ubuntu 24.04 | AArch64 |

            ### Usage
            ```cmake
            list(APPEND CMAKE_PREFIX_PATH "/path/to/draco-dist")
            find_package(draco REQUIRED)

            target_link_libraries(myapp PRIVATE draco::draco)  # full (App + HTTP + core)
            target_link_libraries(myapp PRIVATE draco::http)   # HTTP + core
            target_link_libraries(myapp PRIVATE draco::core)   # reactor only
            ```
            beast_json is fetched automatically at configure time.
          generate_release_notes: true
