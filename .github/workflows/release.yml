name: Release

# Triggered by a version tag push: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub releases and upload assets

# ============================================================================
# Job graph:
#
#   analyze ──┐
#             ├─► build/linux-x86_64   ──┐
#   test    ──┤                           ├─► publish (single release upload)
#             └─► build/linux-aarch64  ──┘
#
# Supported distribution architectures:
#   - linux-x86_64  (Ubuntu 22.04, glibc 2.35+, GCC 13)
#   - linux-aarch64 (Ubuntu 24.04 ARM runner, glibc 2.39+, GCC 13)
#
# C++23 compiler requirement:
#   Ubuntu 22.04 ships GCC 11 / Clang 14 — neither supports <expected>.
#   GCC 13 and Clang 17 are available in the apt repo of the GitHub-hosted
#   runner.  We install them explicitly and pin CMAKE_CXX_COMPILER.
#
# Each build job produces a self-contained include-lib tarball containing
# BOTH static (.a) and shared (.so) variants:
#
#   include/qbuem/          ← all public headers (umbrella: qbuem_stack.hpp)
#   lib/*.a                 ← static libraries  (BUILD_SHARED_LIBS=OFF pass)
#   lib/*.so                ← shared libraries  (BUILD_SHARED_LIBS=ON  pass)
#   lib/cmake/qbuem-stack/  ← CMake package config for find_package()
#
# Build strategy: cmake is invoked twice per architecture.
#   Pass 1 (static):  cmake -DBUILD_SHARED_LIBS=OFF → installs .a + headers + cmake config
#   Pass 2 (shared):  cmake -DBUILD_SHARED_LIBS=ON  → installs .so (headers already in dist)
# The two install trees are merged into a single dist/ directory.
# ============================================================================

jobs:
  # ── 1. Static analysis (clang-tidy) ─────────────────────────────────────────
  analyze:
    name: Static Analysis (clang-tidy)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang 17 + clang-tidy-17 + liburing
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang-17 clang-tidy-17 liburing-dev

      - name: Configure (generate compile_commands.json)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=clang++-17 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DQBUEM_BUILD_TESTS=OFF \
            -DQBUEM_BUILD_EXAMPLES=OFF

      # Build library targets so FetchContent headers are materialised and
      # clang-tidy can resolve all includes.
      - name: Materialise FetchContent headers
        run: cmake --build build --target qbuem_core --target qbuem_http --target qbuem -j$(nproc) || true

      # -config-file is not supported by the run-clang-tidy Python wrapper;
      # clang-tidy automatically discovers .clang-tidy walking up the tree.
      - name: Run clang-tidy
        run: |
          run-clang-tidy-17 \
            -p build \
            -j$(nproc) \
            $(find src -name '*.cpp' | sort)

  # ── 2. Test (both release architectures) ─────────────────────────────────────
  test:
    name: Test / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64
            cxx: g++-13
            extra_pkgs: gcc-13 g++-13
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            cxx: g++
            extra_pkgs: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y liburing-dev ${{ matrix.extra_pkgs }}

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DBUILD_SHARED_LIBS=OFF \
            -DQBUEM_BUILD_TESTS=ON \
            -DQBUEM_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release

  # ── 3. Build release artifacts (static + shared, both architectures) ─────────
  build:
    name: Build / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: [analyze, test]

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x86_64
            cxx: g++-13
            extra_pkgs: gcc-13 g++-13
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            cxx: g++
            extra_pkgs: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y liburing-dev ${{ matrix.extra_pkgs }}

      # ── Pass 1: static libraries (.a) ──────────────────────────────────────
      - name: Configure (static pass)
        run: |
          cmake -B build_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DBUILD_SHARED_LIBS=OFF \
            -DQBUEM_BUILD_TESTS=OFF \
            -DQBUEM_BUILD_EXAMPLES=OFF \
            -DQBUEM_BUILD_BENCH=OFF

      - name: Build (static pass)
        run: cmake --build build_static -j$(nproc)

      - name: Install (static pass → dist/)
        run: cmake --install build_static --prefix dist

      # ── Pass 2: shared libraries (.so) ─────────────────────────────────────
      - name: Configure (shared pass)
        run: |
          cmake -B build_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DBUILD_SHARED_LIBS=ON \
            -DQBUEM_BUILD_TESTS=OFF \
            -DQBUEM_BUILD_EXAMPLES=OFF \
            -DQBUEM_BUILD_BENCH=OFF

      - name: Build (shared pass)
        run: cmake --build build_shared -j$(nproc)

      - name: Install shared libs into dist/lib/
        # Install the shared pass into a staging area, then copy only the
        # shared libraries (.so) into the already-populated dist/.  Headers
        # and CMake configs come exclusively from the static pass.
        run: |
          cmake --install build_shared --prefix dist_shared
          find dist_shared/lib -name "*.so*" -exec cp -P {} dist/lib/ \;

      # ── Verify combined layout ──────────────────────────────────────────────
      - name: Verify include-lib layout
        run: |
          echo "=== Full install tree ==="
          find dist -type f | sort

          echo "=== Checking headers ==="
          test -d dist/include/qbuem \
            || (echo "ERROR: include/qbuem directory missing"        && exit 1)
          test -f dist/include/qbuem/qbuem_stack.hpp \
            || (echo "ERROR: umbrella header qbuem_stack.hpp missing" && exit 1)

          echo "=== Checking static libraries (.a) ==="
          ls dist/lib/*.a > /dev/null 2>&1 \
            || (echo "ERROR: no static libraries (.a) in dist/lib/"  && exit 1)

          echo "=== Checking shared libraries (.so) ==="
          ls dist/lib/*.so* > /dev/null 2>&1 \
            || (echo "ERROR: no shared libraries (.so) in dist/lib/" && exit 1)

          echo "=== Checking CMake package config ==="
          test -f dist/lib/cmake/qbuem-stack/qbuem-stack-config.cmake \
            || (echo "ERROR: CMake package config missing"            && exit 1)

          echo "=== Static libraries ==="
          ls -lh dist/lib/*.a

          echo "=== Shared libraries ==="
          ls -lh dist/lib/*.so*

          echo "Install layout verified."

      # ── Package ─────────────────────────────────────────────────────────────
      - name: Package as tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="qbuem-stack-${VERSION}-${{ matrix.platform }}.tar.gz"
          tar -czf "${ARCHIVE}" -C dist .
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          echo "SHA-256:"
          cat "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          retention-days: 1

  # ── 4. Publish GitHub Release (single job — no race condition) ───────────────
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: [build]

    steps:
      - name: Download all platform tarballs
        uses: actions/download-artifact@v4
        with:
          pattern: qbuem-stack-*
          merge-multiple: true   # flatten all artifacts into cwd

      - name: List artifacts
        run: |
          echo "=== Release artifacts ==="
          ls -lh qbuem-stack-*.tar.gz
          echo "=== Checksums ==="
          cat qbuem-stack-*.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            qbuem-stack-*.tar.gz
            qbuem-stack-*.sha256
          body: |
            ## qbuem-stack ${{ github.ref_name }}

            Zero Latency · Zero Allocation · Zero Dependency
            C++23 high-performance infrastructure library.

            ---

            ### Distribution Packages

            | Artifact | OS | Architecture |
            |----------|----|--------------|
            | `qbuem-stack-${{ github.ref_name }}-linux-x86_64.tar.gz`  | Ubuntu 22.04 (glibc 2.35+) | x86-64  |
            | `qbuem-stack-${{ github.ref_name }}-linux-aarch64.tar.gz` | Ubuntu 24.04 (glibc 2.39+) | AArch64 |

            Each tarball contains **both static and shared** library variants:
            ```
            include/qbuem/          ← all public headers (umbrella: qbuem_stack.hpp)
            lib/*.a                 ← static libraries
            lib/*.so                ← shared libraries
            lib/cmake/qbuem-stack/  ← CMake package config for find_package()
            ```

            Verify integrity with the accompanying `.sha256` files:
            ```bash
            sha256sum -c qbuem-stack-${{ github.ref_name }}-linux-x86_64.tar.gz.sha256
            ```

            ---

            ### Integration

            Extract the tarball, then add to your CMake project:

            ```cmake
            list(APPEND CMAKE_PREFIX_PATH "/path/to/qbuem-stack-dist")
            find_package(qbuem-stack REQUIRED)

            # Full stack (pipeline + HTTP + reactor + all extensions)
            target_link_libraries(myapp PRIVATE qbuem-stack::qbuem)

            # Selective components
            target_link_libraries(myapp PRIVATE qbuem-stack::http)      # HTTP/1.1 only
            target_link_libraries(myapp PRIVATE qbuem-stack::pipeline)  # pipeline only
            target_link_libraries(myapp PRIVATE qbuem-stack::core)      # reactor only
            ```

            Choose static or shared at configure time:
            ```bash
            cmake -DBUILD_SHARED_LIBS=OFF ..   # link statically  (default)
            cmake -DBUILD_SHARED_LIBS=ON  ..   # link dynamically
            ```

            > **Note:** JSON parsing is not bundled. Choose your preferred library
            > (simdjson, nlohmann/json, glaze, etc.) and parse `req.body()` directly.

            > **Requirements:** C++23 compiler (GCC 13+ or Clang 17+), CMake ≥ 3.20,
            > `liburing-dev` on Linux for `io_uring` support.
          generate_release_notes: true
