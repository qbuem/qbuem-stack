name: CI

# Runs on every push and pull request (non-tag commits).
on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Compiler baseline ─────────────────────────────────────────────────────────
# All jobs run on Ubuntu 24.04 which ships GCC 13 + libstdc++-13 by default.
# GCC 13 is the first release with complete C++23 support including <expected>,
# std::print/println, std::flat_map, and the full <ranges> additions.
#
# x86_64 : ubuntu-24.04      (GitHub-hosted)
# aarch64: ubuntu-24.04-arm  (GitHub-hosted ARM runner)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Static analysis (clang-tidy) ─────────────────────────────────────────
  analyze:
    name: Static Analysis (clang-tidy)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang 18 + clang-tidy-18 + liburing
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang-18 clang-tidy-18 clang-tools-18 liburing-dev

      # Generate compile_commands.json with g++ so the standard library
      # include paths are resolved by GCC 13 (which has full C++23 support).
      # clang-tidy-18 reads these commands and applies its analysis using
      # the same flags; ExtraArgs in .clang-tidy supplies -D__cpp_concepts
      # to work around the clang-18 vs libstdc++-13 __cpp_concepts mismatch.
      - name: Configure (generate compile_commands.json)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DQBUEM_BUILD_TESTS=OFF \
            -DQBUEM_BUILD_EXAMPLES=OFF

      # Build library targets so FetchContent headers are materialised before
      # clang-tidy tries to resolve all includes.
      - name: Materialise FetchContent headers
        run: cmake --build build --target qbuem_core --target qbuem_http --target qbuem -j$(nproc) || true

      # clang-tidy auto-discovers .clang-tidy walking up from each source file;
      # -config-file is not accepted by the run-clang-tidy Python wrapper.
      - name: Run clang-tidy
        run: |
          run-clang-tidy-18 \
            -p build \
            -j$(nproc) \
            $(find src -name '*.cpp' | sort)

  # ── 2. Build & test ──────────────────────────────────────────────────────────
  test:
    name: Test / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install liburing
        run: sudo apt-get update -q && sudo apt-get install -y liburing-dev

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++ \
            -DBUILD_SHARED_LIBS=OFF \
            -DQBUEM_BUILD_TESTS=ON \
            -DQBUEM_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release

  # ── 3. Verify install layout (static + shared) ───────────────────────────────
  install-check:
    name: Install Layout / ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: [test]

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install liburing
        run: sudo apt-get update -q && sudo apt-get install -y liburing-dev

      # ── Static pass (.a) ───────────────────────────────────────────────────
      - name: Configure (static pass)
        run: |
          cmake -B build_static \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++ \
            -DBUILD_SHARED_LIBS=OFF \
            -DQBUEM_BUILD_TESTS=OFF \
            -DQBUEM_BUILD_EXAMPLES=OFF

      - name: Build (static pass)
        run: cmake --build build_static -j$(nproc)

      - name: Install static pass → dist/
        run: cmake --install build_static --prefix dist

      # ── Shared pass (.so) ──────────────────────────────────────────────────
      - name: Configure (shared pass)
        run: |
          cmake -B build_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++ \
            -DBUILD_SHARED_LIBS=ON \
            -DQBUEM_BUILD_TESTS=OFF \
            -DQBUEM_BUILD_EXAMPLES=OFF

      - name: Build (shared pass)
        run: cmake --build build_shared -j$(nproc)

      - name: Merge shared libs into dist/lib/
        run: |
          cmake --install build_shared --prefix dist_shared
          find dist_shared/lib -name "*.so*" -exec cp -P {} dist/lib/ \;

      # ── Verify ────────────────────────────────────────────────────────────
      - name: Verify include-lib layout (static + shared)
        run: |
          echo "=== Install tree ==="
          find dist -type f | sort

          test -d dist/include/qbuem \
            || (echo "FAIL: include/qbuem missing"        && exit 1)
          test -f dist/include/qbuem/qbuem_stack.hpp \
            || (echo "FAIL: umbrella header missing"      && exit 1)
          ls dist/lib/*.a    > /dev/null 2>&1 \
            || (echo "FAIL: no .a libs in lib/"           && exit 1)
          ls dist/lib/*.so*  > /dev/null 2>&1 \
            || (echo "FAIL: no .so libs in lib/"          && exit 1)
          test -f dist/lib/cmake/qbuem-stack/qbuem-stack-config.cmake \
            || (echo "FAIL: CMake config missing"         && exit 1)

          echo "Install layout OK"

      - name: Smoke-test find_package
        run: |
          mkdir smoke && cd smoke
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(smoke CXX)
          set(CMAKE_CXX_STANDARD 23)
          list(APPEND CMAKE_PREFIX_PATH "${CMAKE_CURRENT_SOURCE_DIR}/../dist")
          find_package(qbuem-stack REQUIRED)
          add_executable(smoke_test ../tests/reactor_test.cpp)
          target_link_libraries(smoke_test PRIVATE qbuem-stack::qbuem)
          EOF
          cmake -B build_smoke \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++ \
            2>&1 | tail -20
          echo "find_package smoke test OK (configure step)"
